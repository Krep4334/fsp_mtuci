services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: tournament-postgres
    environment:
      POSTGRES_USER: tournament_user
      POSTGRES_PASSWORD: tournament_password
      POSTGRES_DB: tournament_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tournament_user -d tournament_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tournament-network

  # Backend сервер
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tournament-server
    environment:
      DATABASE_URL: postgresql://tournament_user:tournament_password@postgres:5432/tournament_db
      JWT_SECRET: ${JWT_SECRET:-secret-jwt}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: production
      CLIENT_URL: http://localhost:80
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5242880
    ports:
      - "3001:3001"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tournament-network
    restart: unless-stopped

  # Frontend клиент
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tournament-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - tournament-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  server_uploads:
    driver: local

networks:
  tournament-network:
    driver: bridge

